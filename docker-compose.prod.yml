# PSC-DRFMS — Production compose
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key differences from the base dev compose:
#   - No source-code bind mounts
#   - NGINX reverse proxy with TLS termination
#   - MinIO console NOT exposed to host (accessed only through NGINX internally)
#   - Gunicorn/uvicorn workers scaled up
#   - restart: always
#   - Production environment variables expected from .env.prod

services:

  # -------------------------------------------------------------------------
  # Database
  # -------------------------------------------------------------------------
  db:
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # No port mapping — only reachable on the internal Docker network
    ports: []

  # -------------------------------------------------------------------------
  # Redis
  # -------------------------------------------------------------------------
  redis:
    restart: always
    ports: []
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

  # -------------------------------------------------------------------------
  # MinIO
  # -------------------------------------------------------------------------
  minio:
    restart: always
    # Console is NOT exposed to the host — NGINX proxies it on the internal net
    ports: []
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  # -------------------------------------------------------------------------
  # Backend (uvicorn — production workers)
  # -------------------------------------------------------------------------
  backend:
    restart: always
    # No volume mounts — image must contain the full application
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    ports: []
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             uvicorn config.asgi:application
               --host 0.0.0.0 --port 8000
               --workers 4 --worker-class uvicorn.workers.UvicornWorker
               --access-log --log-level warning"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  # -------------------------------------------------------------------------
  # Celery worker
  # -------------------------------------------------------------------------
  celery_worker:
    restart: always
    volumes:
      - media_files:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # -------------------------------------------------------------------------
  # Celery beat
  # -------------------------------------------------------------------------
  celery_beat:
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # -------------------------------------------------------------------------
  # Frontend (pre-built static assets served by nginx inside the image)
  # -------------------------------------------------------------------------
  frontend:
    restart: always
    ports: []
    environment:
      - VITE_API_BASE_URL=/api   # relative — goes through NGINX

  # -------------------------------------------------------------------------
  # NGINX reverse proxy (new service, not in base compose)
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - static_files:/app/staticfiles:ro
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/api/health/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_files:
  media_files:
