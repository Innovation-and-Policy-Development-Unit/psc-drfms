# PSC-DRFMS — NGINX reverse proxy
# Terminates TLS, routes API/WebSocket/frontend traffic.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -----------------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # -----------------------------------------------------------------------
    # Performance
    # -----------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # -----------------------------------------------------------------------
    # Security headers (applied to all responses)
    # -----------------------------------------------------------------------
    add_header X-Frame-Options            "DENY"              always;
    add_header X-Content-Type-Options     "nosniff"           always;
    add_header X-XSS-Protection           "1; mode=block"     always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    server_tokens off;

    # -----------------------------------------------------------------------
    # Rate limiting zones
    # -----------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr  zone=auth:10m  rate=10r/m;
    limit_req_zone  $binary_remote_addr  zone=api:10m   rate=60r/s;

    # -----------------------------------------------------------------------
    # Upstream services
    # -----------------------------------------------------------------------
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
    }

    # -----------------------------------------------------------------------
    # HTTP → HTTPS redirect
    # -----------------------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # -----------------------------------------------------------------------
    # HTTPS — main server block
    # -----------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling        on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        client_max_body_size 110m;   # slightly above the 100 MB upload limit

        # ------------------------------------------------------------------
        # Auth endpoints — tighter rate limit
        # ------------------------------------------------------------------
        location ~ ^/api/auth/token/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # API (REST)
        # ------------------------------------------------------------------
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # ------------------------------------------------------------------
        # WebSocket (Django Channels)
        # ------------------------------------------------------------------
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
        }

        # ------------------------------------------------------------------
        # Django admin
        # ------------------------------------------------------------------
        location /admin/ {
            # Restrict admin to internal network or VPN in production
            # allow  10.0.0.0/8;
            # deny   all;
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # Static files served by backend (WhiteNoise)
        # ------------------------------------------------------------------
        location /static/ {
            proxy_pass http://backend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ------------------------------------------------------------------
        # Health check — no auth, no rate limit
        # ------------------------------------------------------------------
        location /api/health/ {
            proxy_pass http://backend;
            access_log off;
        }

        # ------------------------------------------------------------------
        # React SPA — everything else
        # ------------------------------------------------------------------
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # -----------------------------------------------------------------------
    # MinIO console — internal only (no public exposure)
    # -----------------------------------------------------------------------
    server {
        listen 9001;
        # Bind only on the internal Docker network.
        # Do NOT expose port 9001 to the host in production.
        location / {
            proxy_pass http://minio:9001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
